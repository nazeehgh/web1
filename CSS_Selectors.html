    <title>CSS Selectors</title>

    <!-- Internal Style -->
    <style>


                /* ID selector */
        #moh{
            color: blue;
            text-decoration: line-through;
        }

        /*element selector-->*/
        p{
            color:red;
            font-size: 14px;
            text-decoration:underline;
        
        } 
/*class selector-->*/
        .moayad{
            color: green ;
            background-color: rgb(236, 231, 231) !important;
        }

        .abc{
            font-family: Georgia, 'Times New Roman', Times, serif;
        }


/* *{

    </style>


</head>
<body>

    </p>

    <pre id="moh" class="moayad">

    </pre>

    <p class="moayad abc">Lorem ipsum dolor sit amet.</p>

</html>
