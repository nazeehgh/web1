<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>

    <style>
        td{
            border: 1px solid black;
        }
    </style>
</head>
<body>

    <table style="border: 1px solid black;">
        <tr>
            <td>A</td> <td rowspan="3">B</td>  <td>C</td>

        </tr>

        <tr>
            <td>D</td>   <td>F</td>

        </tr>
        
        <tr>
<td>G</td>   <td>I</td>
        </tr>


        <tr>
<td colspan="2">J</td>  <td>L</td>

        </tr>

    </table>
    
</body>
</html>
